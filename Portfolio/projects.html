    <script>
    let square = document.getElementById("festa");
    square.style.left = "0px";
    let leftPos = 0; 
    const RIGHT_END = 2000 - square.offsetWidth; 
    let timer = setInterval(moveRight, 5);
    function moveRight() {
        leftPos += 1;
        square.style.left = leftPos + "px";
        if (leftPos >= RIGHT_END) {
            clearInterval(timer);
        }
    }
